name: Run Scraper

on:
  workflow_dispatch:
    inputs:
      cities:
        description: 'Cities to scrape comma separated e.g. bangalore,mumbai,delhi'
        required: false
        default: 'bangalore'
  schedule:
    - cron: '0 2 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CITIES: ${{ github.event.inputs.cities || 'bangalore' }}
          BASE_URL: https://bangalore.idbf.in
          HEADLESS: true
          MIN_DELAY_MS: 2000
          MAX_DELAY_MS: 5000
          MAX_RETRIES: 3
          LOG_LEVEL: info
          OUTPUT_DIR: ./output
        run: node index.js

      - name: Upload output as artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: scraper-output-${{ github.run_id }}
          path: output/
          retention-days: 7
