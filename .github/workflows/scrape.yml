name: Run Scraper

on:
  workflow_dispatch:
    inputs:
      cities:
        description: 'Cities to scrape e.g. bangalore,mumbai,delhi'
        required: false
        default: 'bangalore'
  schedule:
    - cron: '0 2 * * *'

jobs:
  scrape:
    # Change this to 'self-hosted' to run on your own machine
    # Setup: https://github.com/YOUR_USERNAME/YOUR_REPO/settings/actions/runners
    runs-on: self-hosted
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CITIES: ${{ github.event.inputs.cities || 'bangalore' }}
          CITY: bangalore
          BASE_URL: https://idbf.in
          HEADLESS: true
          MIN_DELAY_MS: 1500
          MAX_DELAY_MS: 3000
          MAX_RETRIES: 3
          LOG_LEVEL: info
          OUTPUT_DIR: ./output
        run: node index.js

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-output-${{ github.run_id }}
          path: output/
          retention-days: 30
