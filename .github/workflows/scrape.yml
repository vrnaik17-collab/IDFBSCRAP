- name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CITIES: ${{ github.event.inputs.cities || 'bangalore' }}
          BASE_URL: https://idbf.in
          HEADLESS: true
          MIN_DELAY_MS: 1500
          MAX_DELAY_MS: 3000
          MAX_RETRIES: 3
          LOG_LEVEL: info
          OUTPUT_DIR: ./output
        run: node index.js
