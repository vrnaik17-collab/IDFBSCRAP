services:
  - type: worker
    name: idbf-scraper
    env: node
    plan: starter
    buildCommand: npm install && npx playwright install chromium --with-deps
    startCommand: node index.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: BASE_URL
        value: https://bangalore.idbf.in
      - key: HEADLESS
        value: "true"
      - key: MIN_DELAY_MS
        value: "2500"
      - key: MAX_DELAY_MS
        value: "5500"
      - key: MAX_RETRIES
        value: "3"
      - key: LOG_LEVEL
        value: info
      - key: OUTPUT_DIR
        value: ./output
      - key: NODE_ENV
        value: production
